name: Weekly spec-data refresh

# Regenerates SpecDistribution.lua from Blizzard's PvP leaderboard API and, if
# the data changed, commits it, tags a new version, and publishes a GitHub
# Release so WowUp auto-updates. Also runnable on demand from the Actions tab.
on:
  schedule:
    - cron: '17 8 * * 2'   # Tuesdays ~08:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Regenerate spec distribution
        env:
          BNET_CLIENT_ID: ${{ secrets.BNET_CLIENT_ID }}
          BNET_CLIENT_SECRET: ${{ secrets.BNET_CLIENT_SECRET }}
          REGION: eu
          SPECDIST_OUT: ${{ github.workspace }}/SpecDistribution.lua
        run: python3 tools/gen_specdist.py

      - name: Commit, tag and release if the data changed
        env:
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
        run: |
          set -e
          if git diff --quiet -- SpecDistribution.lua; then
            echo "No data change; nothing to release."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SpecDistribution.lua
          git commit -m "data: weekly spec distribution refresh"
          # Next version = highest existing vX.Y.Z tag with the patch bumped
          # (github.run_number is per-workflow and collides with manual tags).
          latest=$(git tag -l 'v*' | sort -V | tail -1); [ -z "$latest" ] && latest=v1.0.0
          ver=${latest#v}; MA=${ver%%.*}; rest=${ver#*.}; MI=${rest%%.*}; PA=${rest#*.}
          PA=$((PA+1)); TAG="v$MA.$MI.$PA"
          while git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; do PA=$((PA+1)); TAG="v$MA.$MI.$PA"; done
          echo "Releasing $TAG"
          git tag -a "$TAG" -m "Weekly data refresh $TAG"
          git push origin HEAD:${{ github.ref_name }} --follow-tags
          # Package the freshly-tagged HEAD (exact tag -> proper release, not alpha).
          curl -sSf https://raw.githubusercontent.com/BigWigsMods/packager/master/release.sh | bash
